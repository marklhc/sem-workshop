- id: bollen1989
  abstract: >-
    "Structural Equations with Latent Variables" is a comprehensive treatment of
    the general structural equation system better known as the LISREL model. The
    book serves three purposes. First, it demonstrates the generality of this
    model. Rather than treating path analysis, recursive and nonrecursive
    models, classical econometrics, and confirmatory factor analysis as unique,
    they are treated as special cases of a common model. The second purpose is
    to emphasize the application of these techniques. Empirical examples appear
    throughout. Several chapters contain some of the LISREL or EQS programs the
    author used to obtain the results for the empirical examples. Finally, the
    book explores the crucial role played by substantive expertise in most
    stages of the modeling process.  "Structural Equations with Latent
    Variables" fills the gap existing in the treatment of this subject between
    introductory texts and specialized papers. It provides social scientists,
    market researchers, applied statisticians, other analysts, and graduate
    students with a thorough examination of LISREL/structural equation models.
    At the same time it presents new material on measurement reliability and
    validity, overall fit indices, model identification, and other topics.
    (PsycINFO Database Record (c) 2019 APA, all rights reserved)
